<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Passando o Caso — Companion</title>
    <style>
      :root {
        --azul: #1a6b8a; /* azul clínico */
        --azul-escuro: #155772;
        --verde: #0e7a5a; /* verde esmeralda */
        --verde-escuro: #0b6249;
        --texto: #0f2d52;
        --muted: #64748b;
        --borda: #e2e8f0;
        --fundo: #f8fafb;
        --card: #ffffff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: var(--fundo);
        color: var(--texto);
        line-height: 1.5;
      }
      header {
        background: var(--azul);
        color: #fff;
        padding: 16px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 { font-size: 18px; margin: 0; font-weight: 700; }
      header .quem { font-size: 13px; opacity: 0.95; }
      header .quem a { color: #fff; }
      .container { max-width: 820px; margin: 0 auto; padding: 24px 16px 64px; }

      /* Login */
      .login {
        max-width: 380px;
        margin: 64px auto;
        background: var(--card);
        border: 1px solid var(--borda);
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 4px 20px rgba(15, 45, 82, 0.06);
      }
      .login h2 { margin: 0 0 4px; font-size: 20px; }
      .login p { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
      label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
      input {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--borda);
        border-radius: 8px;
        font-size: 15px;
        color: var(--texto);
        background: #fff;
      }
      input:focus { outline: 2px solid var(--azul); border-color: var(--azul); }
      button {
        cursor: pointer;
        border: none;
        font-weight: 600;
        border-radius: 8px;
      }
      .btn-primario {
        width: 100%;
        margin-top: 20px;
        background: var(--azul);
        color: #fff;
        padding: 12px;
        font-size: 15px;
      }
      .btn-primario:hover { background: var(--azul-escuro); }

      /* Barra de filtros */
      .filtros {
        display: flex;
        gap: 12px;
        align-items: flex-end;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }
      .filtros .campo { flex: 1; min-width: 160px; }
      .filtros label { margin-top: 0; }
      .btn-sec {
        background: #fff;
        border: 1px solid var(--azul);
        color: var(--azul);
        padding: 10px 16px;
        font-size: 14px;
      }
      .btn-sec:hover { background: #eef5f8; }

      /* Cards de evolução */
      .card {
        background: var(--card);
        border: 1px solid var(--borda);
        border-radius: 12px;
        padding: 18px;
        margin-bottom: 16px;
        box-shadow: 0 2px 8px rgba(15, 45, 82, 0.04);
      }
      .card-topo {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .card h3 { margin: 0; font-size: 16px; color: var(--texto); }
      .btn-copiar {
        background: var(--verde);
        color: #fff;
        padding: 8px 14px;
        font-size: 13px;
        white-space: nowrap;
      }
      .btn-copiar:hover { background: var(--verde-escuro); }
      .btn-copiar.ok { background: var(--verde-escuro); }
      pre {
        margin: 0;
        white-space: pre-wrap;
        word-wrap: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        color: var(--texto);
        background: var(--fundo);
        border-radius: 8px;
        padding: 12px;
        max-height: 360px;
        overflow: auto;
      }
      .vazio, .erro {
        text-align: center;
        color: var(--muted);
        padding: 48px 16px;
        font-size: 15px;
      }
      .erro { color: #991b1b; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <!-- Tela de login -->
    <div id="tela-login">
      <div class="login">
        <h2>Passando o Caso</h2>
        <p>Companion web — entre com seu ID de médico para ver as evoluções do dia.</p>
        <label for="medicoId">ID do médico</label>
        <input id="medicoId" type="text" placeholder="ex.: medico-001" autocomplete="username" />
        <button class="btn-primario" onclick="entrar()">Entrar</button>
      </div>
    </div>

    <!-- App -->
    <div id="tela-app" class="hidden">
      <header>
        <h1>📋 Passando o Caso</h1>
        <span class="quem"><span id="quem"></span> · <a href="#" onclick="sair()">sair</a></span>
      </header>
      <div class="container">
        <div class="filtros">
          <div class="campo">
            <label for="data">Data</label>
            <input id="data" type="date" />
          </div>
          <button class="btn-sec" onclick="carregar()">Atualizar</button>
        </div>
        <div id="lista"></div>
      </div>
    </div>

    <script>
      // URL da API. Ajuste aqui para apontar para o backend em produção.
      const API_URL = "https://api.passandocaso.com.br";

      let medicoId = "";

      function hojeISO() {
        const d = new Date();
        const mes = String(d.getMonth() + 1).padStart(2, "0");
        const dia = String(d.getDate()).padStart(2, "0");
        return `${d.getFullYear()}-${mes}-${dia}`;
      }

      function entrar() {
        const valor = document.getElementById("medicoId").value.trim();
        if (!valor) {
          alert("Informe o ID do médico.");
          return;
        }
        medicoId = valor;
        document.getElementById("quem").textContent = medicoId;
        document.getElementById("tela-login").classList.add("hidden");
        document.getElementById("tela-app").classList.remove("hidden");
        document.getElementById("data").value = hojeISO();
        carregar();
      }

      function sair() {
        medicoId = "";
        document.getElementById("tela-app").classList.add("hidden");
        document.getElementById("tela-login").classList.remove("hidden");
      }

      function escapeHtml(s) {
        return (s || "").replace(
          /[&<>]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[c],
        );
      }

      async function carregar() {
        const data = document.getElementById("data").value || hojeISO();
        const lista = document.getElementById("lista");
        lista.innerHTML = '<div class="vazio">Carregando...</div>';
        try {
          const resp = await fetch(
            `${API_URL}/api/evolucao/${encodeURIComponent(medicoId)}/${data}`,
          );
          if (!resp.ok) throw new Error("HTTP " + resp.status);
          const json = await resp.json();
          renderizar(json.evolucoes || []);
        } catch (e) {
          lista.innerHTML =
            '<div class="erro">Não foi possível conectar à API (' +
            escapeHtml(API_URL) +
            ").<br>Verifique a configuração do backend.</div>";
        }
      }

      function renderizar(evolucoes) {
        const lista = document.getElementById("lista");
        if (!evolucoes.length) {
          lista.innerHTML =
            '<div class="vazio">Nenhuma evolução para esta data.</div>';
          return;
        }
        window.__evolucoes = evolucoes;
        lista.innerHTML = evolucoes
          .map(
            (e, i) => `
          <div class="card">
            <div class="card-topo">
              <h3>${escapeHtml(e.nome || "Paciente")}</h3>
              <button class="btn-copiar" id="copiar-${i}" onclick="copiar(${i})">📋 Copiar evolução</button>
            </div>
            <pre id="texto-${i}">${escapeHtml(e.texto)}</pre>
          </div>`,
          )
          .join("");
      }

      async function copiar(i) {
        const texto = (window.__evolucoes[i] || {}).texto || "";
        try {
          await navigator.clipboard.writeText(texto);
        } catch {
          const range = document.createRange();
          range.selectNodeContents(document.getElementById("texto-" + i));
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          document.execCommand("copy");
        }
        const btn = document.getElementById("copiar-" + i);
        btn.textContent = "✓ Copiado!";
        btn.classList.add("ok");
        setTimeout(() => {
          btn.textContent = "📋 Copiar evolução";
          btn.classList.remove("ok");
        }, 2000);
      }
    </script>
  </body>
</html>
